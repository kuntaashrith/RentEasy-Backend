version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: renteasy
      POSTGRES_USER: ${DB_USERNAME:-renteasy_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-renteasy_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-renteasy_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/renteasy
      - DB_USERNAME=${DB_USERNAME:-renteasy_admin}
      - DB_PASSWORD=${DB_PASSWORD:-renteasy_secure_password}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
